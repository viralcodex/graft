services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-raft}
      POSTGRES_USER: ${POSTGRES_USER:-raft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raft}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DB_DATA_DIR:-./data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5