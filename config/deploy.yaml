apiVersion: v1
kind: Service
metadata:
  name: raft-peer
spec:
  clusterIP: None
  selector:
    app: raft-peer
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: raft-peer
spec:
  selector:
    matchLabels:
      app: raft-peer
  serviceName: raft-peer
  replicas: 3
  template:
    metadata:
      labels:
        app: raft-peer
    spec:
      containers:
        - name: raft-peer
          image: raft-peer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: RAFT_PORT
              value: "8080"
            - name: RAFT_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RAFT_CLUSTER
              value: raft-peer-0.raft-peer:8080,raft-peer-1.raft-peer:8080,raft-peer-2.raft-peer:8080
            - name: RAFT_STATE_DIR
              value: /data/raft
            - name: DATABASE_URL
              value: postgres://raft:raft@127.0.0.1:5432/raft?sslmode=disable
          volumeMounts:
            - name: raft-data
              mountPath: /data/raft
          resources:
            limits:
              cpu: "2"
              memory: "256Mi"
            requests:
              cpu: "1"
              memory: "128Mi"
          #health probes
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20

        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: raft
            - name: POSTGRES_USER
              value: raft
            - name: POSTGRES_PASSWORD
              value: raft
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              cpu: "2"
              memory: "256Mi"
            requests:
              cpu: "1"
              memory: "128Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "raft", "-d", "raft"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

  volumeClaimTemplates:
    - metadata:
        name: raft-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 7000
      targetPort: 7000
      nodePort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway:latest
          imagePullPolicy: Always
          env:
            - name: GATEWAY_PORT
              value: "7000"
            - name: RAFT_CLUSTER
              value: raft-peer-0.raft-peer:8080,raft-peer-1.raft-peer:8080,raft-peer-2.raft-peer:8080
          ports:
            - containerPort: 7000
          resources:
            limits:
              cpu: "2"
              memory: "256Mi"
            requests:
              cpu: "1"
              memory: "128Mi"
          #health probes
          readinessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
